<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Калькулятор</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #f0f0f0;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  font-family: 'Segoe UI', sans-serif;
}

.calculator {
  background: #fff;
  border-radius: 16px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.15);
  padding: 20px;
  width: 320px;
}

/* Дисплей */
.display {
  background: #1a1a2e;
  border-radius: 10px;
  padding: 16px;
  margin-bottom: 16px;
  min-height: 90px;
}

#expr {
  color: #8888aa;
  font-size: 14px;
  min-height: 20px;
  word-break: break-all;
  text-align: right;
  margin-bottom: 8px;
}

#result {
  color: #ffffff;
  font-size: 28px;
  font-weight: 300;
  text-align: right;
  word-break: break-all;
}

#result.error { color: #ff6b6b; font-size: 16px; }

/* Кнопки */
.buttons {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
}

button {
  height: 56px;
  border: none;
  border-radius: 10px;
  font-size: 18px;
  cursor: pointer;
  transition: opacity 0.1s, transform 0.1s;
}

button:active { opacity: 0.7; transform: scale(0.95); }

/* Типы кнопок */
.btn-num  { background: #f5f5f5; color: #333; }
.btn-op   { background: #e8f0fe; color: #1a73e8; font-size: 20px; }
.btn-eq   { background: #1a73e8; color: #fff; font-size: 22px; }
.btn-clr  { background: #fce8e6; color: #d93025; font-weight: 600; }
.btn-del  { background: #fce8e6; color: #d93025; font-size: 20px; }
.btn-par  { background: #f0f0f0; color: #555; }

button:hover { filter: brightness(0.95); }
</style>
</head>
<body>

<div class="calculator">

  <!-- Дисплей -->
  <div class="display">
    <div id="expr"></div>
    <div id="result">0</div>
  </div>

  <!-- Кнопки -->
  <div class="buttons">
    <!-- Строка 1 -->
    <button class="btn-clr" onclick="clearAll()">C</button>
    <button class="btn-par" onclick="append('(')"> ( </button>
    <button class="btn-par" onclick="append(')')"> ) </button>
    <button class="btn-del" onclick="deleteLast()">⌫</button>

    <!-- Строка 2 -->
    <button class="btn-num" onclick="append('7')">7</button>
    <button class="btn-num" onclick="append('8')">8</button>
    <button class="btn-num" onclick="append('9')">9</button>
    <button class="btn-op"  onclick="append('/')">÷</button>

    <!-- Строка 3 -->
    <button class="btn-num" onclick="append('4')">4</button>
    <button class="btn-num" onclick="append('5')">5</button>
    <button class="btn-num" onclick="append('6')">6</button>
    <button class="btn-op"  onclick="append('*')">×</button>

    <!-- Строка 4 -->
    <button class="btn-num" onclick="append('1')">1</button>
    <button class="btn-num" onclick="append('2')">2</button>
    <button class="btn-num" onclick="append('3')">3</button>
    <button class="btn-op"  onclick="append('-')">−</button>

    <!-- Строка 5 -->
    <button class="btn-num" onclick="append('0')">0</button>
    <button class="btn-num" onclick="append('.')">.</button>
    <button class="btn-op"  onclick="append('+')">+</button>
    <button class="btn-eq"  onclick="calculate()">=</button>
  </div>

</div>

<script>
let expr = '';

// Показать выражение на дисплее
function updateDisplay() {
  document.getElementById('expr').textContent = expr;
}

// Добавить символ к выражению
function append(symbol) {
  expr += symbol;
  updateDisplay();
}

// Удалить последний символ
function deleteLast() {
  expr = expr.slice(0, -1);
  updateDisplay();
}

// Очистить всё
function clearAll() {
  expr = '';
  updateDisplay();
  document.getElementById('result').textContent = '0';
  document.getElementById('result').className = '';
}

// Отправить на сервер POST-запросом
async function calculate() {
  if (!expr.trim()) return;

  // Формируем POST-запрос
  const body = new URLSearchParams({ expr: expr });

  try {
    const response = await fetch('calc.php', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: body
    });

    const data = await response.json();
    const resultEl = document.getElementById('result');

    if (data.error) {
      resultEl.textContent = data.error;
      resultEl.className = 'error';
    } else {
      // Сервер вернул результат — показываем его
      // Также обновляем URL с GET-параметром result
      const url = new URL(window.location.href);
      url.searchParams.set('result', data.result);
      history.replaceState(null, '', url);

      resultEl.textContent = data.result;
      resultEl.className = '';

      // Показываем выражение в верхней строке, очищаем ввод
      document.getElementById('expr').textContent = expr + ' =';
      expr = data.result;
    }

  } catch (e) {
    document.getElementById('result').textContent = 'Ошибка соединения';
    document.getElementById('result').className = 'error';
  }
}

// Поддержка клавиатуры
document.addEventListener('keydown', (e) => {
  if ('0123456789.+-*/()'.includes(e.key)) { append(e.key); return; }
  if (e.key === 'Enter' || e.key === '=')  { calculate(); return; }
  if (e.key === 'Backspace')               { deleteLast(); return; }
  if (e.key === 'Escape')                  { clearAll(); return; }
});
</script>

</body>
</html>
