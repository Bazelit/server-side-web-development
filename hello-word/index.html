<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hello, World! - PHP Backend</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: Arial, sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .header {
        background: #0033a0;
        padding: 1rem 2rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        color: white;
      }

      .logo {
        height: 50px;
        width: auto;
      }

      .title {
        font-size: 1.2rem;
        font-weight: bold;
        text-align: center;
      }

      .main {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        background: #f0f0f0;
      }

      .card {
        background: white;
        border-radius: 20px;
        padding: 3rem;
        text-align: center;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        max-width: 500px;
        width: 100%;
      }

      h1 {
        font-size: 2rem;
        margin-bottom: 1rem;
        color: #0033a0;
      }

      .message {
        font-size: 2rem;
        margin: 1.5rem 0;
        padding: 1rem;
        background: #e0a800;
        color: white;
        border-radius: 10px;
      }

      button {
        background: #0033a0;
        color: white;
        border: none;
        padding: 0.8rem 1.5rem;
        font-size: 1rem;
        border-radius: 10px;
        cursor: pointer;
        margin: 0.5rem;
        transition: background 0.2s;
      }

      button:hover {
        background: #002277;
      }

      .footer {
        background: #333;
        color: white;
        text-align: center;
        padding: 1rem;
      }

      .loading {
        opacity: 0.6;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <header class="header">
      <img
        class="logo"
        src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRvp42kooFZKGZYiw4purSlyg0t9IGIeyBH3w&s"
        alt="Логотип МосПолитеха"
      />
      <div class="title">Выполнил Гумашян Давид Артакович 251-3210</div>
      <div style="width: 100px"></div>
    </header>

    <main class="main">
      <div class="card">
        <h1>Динамический контент (PHP + AJAX)</h1>
        <div class="message" id="helloMessage">Загрузка...</div>
        <button id="changeBtn">Сменить фразу (через PHP)</button>
        <button id="resetBtn">Сброс (через PHP)</button>
      </div>
    </main>

    <footer class="footer">задание для самостоятельной работы</footer>

    <script>
      const messageEl = document.getElementById("helloMessage");

      // Функция загрузки данных с сервера (PHP)
      async function loadMessage(action = "get") {
        try {
          const formData = new FormData();
          formData.append("action", action);

          const response = await fetch("backend.php", {
            method: "POST",
            body: formData,
          });

          if (!response.ok) throw new Error("Ошибка сервера");

          const data = await response.json();

          if (data.success) {
            messageEl.textContent = data.message;
          } else {
            messageEl.textContent = "Ошибка: " + (data.error || "Неизвестная ошибка");
          }
        } catch (error) {
          messageEl.textContent = "Ошибка подключения к серверу";
          console.error(error);
        }
      }

      // Инициализация - загружаем текущую фразу с сервера
      loadMessage("get");

      // Сменить фразу
      document.getElementById("changeBtn").onclick = function () {
        loadMessage("next");
      };

      // Сброс
      document.getElementById("resetBtn").onclick = function () {
        loadMessage("reset");
      };
    </script>
  </body>
</html>
